<html lang="de">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Reisetagebuch" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#F7F4EF" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F7F4EF; }
    body {
      font-family: 'DM Sans', sans-serif;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    textarea { resize: none; }
    input, textarea, button { -webkit-appearance: none; appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    .leaflet-container { border-radius: 14px; }
    .leaflet-attribution-flag { display: none !important; }
  </style>

<body>
  <div id="root"></div>

  <script>
  // Demo-Daten: nur laden wenn noch keine echten Daten vorhanden
  (function() {
    var KEY = "reisetagebuch_trips_v1";
    var KEY_E = "reisetagebuch_entries_v1";
    try {
      var existing = JSON.parse(localStorage.getItem(KEY) || '[]');
      if (existing.length > 0) return; // echte Daten vorhanden
    } catch(e) {}

    var makePhoto = function(emoji, bg, label) {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400">' +
        '<rect width="600" height="400" fill="' + bg + '"/>' +
        '<text x="300" y="200" font-size="120" text-anchor="middle" dominant-baseline="middle" font-family="Arial">' + emoji + '</text>' +
        '<rect x="0" y="320" width="600" height="80" fill="rgba(0,0,0,0.4)"/>' +
        '<text x="300" y="368" font-size="32" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">' + label + '</text>' +
        '</svg>';
      try { return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))); }
      catch(e) { return ''; }
    };

    // Fotos in IndexedDB speichern
    var photos = [
      { id:'demo-p1', data: makePhoto('🌿','#3d6b4f','Affenwald') },
      { id:'demo-p2', data: makePhoto('🛕','#7a5a3a','Tempel') },
      { id:'demo-p3', data: makePhoto('🌾','#5a7a3a','Reisterrassen') },
    ];
    var req = indexedDB.open("reisetagebuch_db", 1);
    req.onupgradeneeded = function(e) { e.target.result.createObjectStore("photos", { keyPath:"id" }); };
    req.onsuccess = function(e) {
      var db = e.target.result;
      var tx = db.transaction("photos", "readwrite");
      var store = tx.objectStore("photos");
      photos.forEach(function(p) { store.put({ id: p.id, dataUrl: p.data }); });
    };

    var trip = { id:"demo-trip-1", name:"Bali mit Juppi", destination:"Indonesien",
      startDate:"2025-03-10", endDate:"2025-03-24", createdAt: Date.now() };
    var entry = { id:"demo-entry-1", tripId:"demo-trip-1", date:"2025-03-14",
      location:"Ubud, Bali", lat:-8.5069, lng:115.2625,
      text:"Heute war ein unvergesslicher Tag in Ubud. Wir besuchten den Heiligen Affenwald – die Affen waren frech und neugierig. Kaum hatten wir das Tor passiert, sprang einer direkt auf Juppi’s Schulter.\n\nDer Tempel Pura Dalem Agung versteckt sich tief im üppigen Regenwald. Das Moos überwächst die alten Steinskulpturen, überall riecht es nach Blütenopfern und Weihrauch. Wir beobachteten eine stille Zeremonie.\n\nBeim Mittagessen in einem kleinen Warung gab es frisches Nasi Goreng mit Blick auf die terrassierten Reisfelder. Das Licht war golden wie in einem Gemälde.\n\nNachmittags besuchten wir eine traditionelle Batik-Werkstatt. Der Meister zeigte uns wie Wachs mit einem Tjanting auf den Stoff aufgetragen wird – eine Arbeit die Stunden dauert.",
      photos:[
        { id:"demo-p1", caption:"Im Heiligen Affenwald" },
        { id:"demo-p2", caption:"Pura Dalem Agung Tempel" },
        { id:"demo-p3", caption:"Tegalalang Reisterrassen" }
      ],
      createdAt: Date.now() };

    localStorage.setItem(KEY,   JSON.stringify([trip]));
    localStorage.setItem(KEY_E, JSON.stringify([entry]));
  })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─────────────────────────────────────────────────────
    //  KONSTANTEN
    // ─────────────────────────────────────────────────────
    const STORAGE_TRIPS   = "reisetagebuch_trips_v1";
    const STORAGE_ENTRIES = "reisetagebuch_entries_v1";
    const STORAGE_ROUTES  = "reisetagebuch_routes_v1";
    const DB_NAME   = "reisetagebuch_db";
    const DB_VER    = 1;
    const STORE     = "photos";

    // ─────────────────────────────────────────────────────
    //  INDEXEDDB  (Foto-Speicher)
    // ─────────────────────────────────────────────────────
    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: "id" });
        req.onsuccess  = e => resolve(e.target.result);
        req.onerror    = ()  => reject(req.error);
      });
    }
    async function dbSavePhoto(id, dataUrl) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put({ id, dataUrl });
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    }
    async function dbGetPhoto(id) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx  = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).get(id);
        req.onsuccess = () => res(req.result?.dataUrl || null);
        req.onerror   = () => rej(req.error);
      });
    }
    async function dbGetPhotos(ids) {
      if (!ids.length) return {};
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx    = db.transaction(STORE, "readonly");
        const store = tx.objectStore(STORE);
        const result = {};
        let pending = ids.length;
        ids.forEach(id => {
          const req = store.get(id);
          req.onsuccess = () => { if (req.result) result[id] = req.result.dataUrl; if (!--pending) res(result); };
          req.onerror   = () => { if (!--pending) res(result); };
        });
      });
    }
    async function dbDeletePhoto(id) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    }
    async function dbGetAllPhotos() {
      const db = await openDB();
      return new Promise((res, rej) => {
        const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
        req.onsuccess = () => res(req.result || []);
        req.onerror   = () => rej(req.error);
      });
    }
    async function dbClearPhotos() {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).clear();
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    }

    // ─────────────────────────────────────────────────────
    //  EXIF-ORIENTIERUNG KORRIGIEREN (für jsPDF)
    // ─────────────────────────────────────────────────────
    function readExifOrientation(dataUrl) {
      try {
        const base64 = dataUrl.split(',')[1];
        if (!base64) return 1;
        const bin = atob(base64);
        const b = i => bin.charCodeAt(i);
        if (b(0) !== 0xFF || b(1) !== 0xD8) return 1;
        let off = 2;
        while (off < bin.length - 4) {
          if (b(off) !== 0xFF) break;
          const marker = b(off + 1);
          const len = (b(off + 2) << 8) | b(off + 3);
          if (marker === 0xE1 &&
              b(off+4)===0x45 && b(off+5)===0x78 && b(off+6)===0x69 && b(off+7)===0x66) {
            const t = off + 10;
            const le = b(t) === 0x49;
            const rs = o => le ? (b(t+o) | b(t+o+1)<<8) : (b(t+o)<<8 | b(t+o+1));
            const rl = o => le ? (b(t+o) | b(t+o+1)<<8 | b(t+o+2)<<16 | b(t+o+3)<<24)
                               : (b(t+o)<<24 | b(t+o+1)<<16 | b(t+o+2)<<8 | b(t+o+3));
            const ifd = rl(4);
            const n = rs(ifd);
            for (let i = 0; i < n; i++) {
              const e = ifd + 2 + i * 12;
              if (rs(e) === 0x0112) return rs(e + 8);
            }
          }
          if (marker === 0xDA) break;
          off += 2 + len;
        }
      } catch(e) {}
      return 1;
    }

    async function fixImageOrientation(dataUrl) {
      const orientation = readExifOrientation(dataUrl);
      if (orientation === 1) return dataUrl;
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const w = img.naturalWidth, h = img.naturalHeight;
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          if (orientation >= 5) { canvas.width = h; canvas.height = w; }
          else                  { canvas.width = w; canvas.height = h; }
          switch (orientation) {
            case 2: ctx.transform(-1, 0,  0,  1,  w,  0); break;
            case 3: ctx.transform(-1, 0,  0, -1,  w,  h); break;
            case 4: ctx.transform( 1, 0,  0, -1,  0,  h); break;
            case 5: ctx.transform( 0, 1,  1,  0,  0,  0); break;
            case 6: ctx.transform( 0, 1, -1,  0,  h,  0); break;
            case 7: ctx.transform( 0,-1, -1,  0,  h,  w); break;
            case 8: ctx.transform( 0,-1,  1,  0,  0,  w); break;
          }
          ctx.drawImage(img, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.88));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    // Emojis aus Text entfernen (jsPDF-Schriften kennen keine Emoji-Glyphen)
    function stripEmoji(str) {
      if (!str) return '';
      return str.replace(/\p{Extended_Pictographic}[︎️]?/gu, '')
                .replace(/[\u{FE00}-\u{FE0F}]/gu, '')
                .replace(/  +/g, ' ')
                .trim();
    }

    // Foto auf Zielformat zuschneiden (object-fit: cover) für Deckblatt
    function cropToRatio(dataUrl, targetW, targetH) {
      return new Promise(res => {
        const img = new Image();
        img.onload = () => {
          const srcR = img.width / img.height;
          const dstR = targetW / targetH;
          let sx, sy, sw, sh;
          if (srcR > dstR) { sh = img.height; sw = sh * dstR; sy = 0; sx = (img.width - sw) / 2; }
          else             { sw = img.width;  sh = sw / dstR; sx = 0; sy = (img.height - sh) / 2; }
          const c = document.createElement('canvas');
          c.width = Math.round(sw); c.height = Math.round(sh);
          c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, c.width, c.height);
          res(c.toDataURL('image/jpeg', 0.88));
        };
        img.onerror = () => res(dataUrl);
        img.src = dataUrl;
      });
    }

    // ─────────────────────────────────────────────────────
    //  LOCALSTORAGE HOOK
    // ─────────────────────────────────────────────────────
    function useLocalStorage(key, init) {
      const [state, setState] = useState(() => {
        try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
        catch { return init; }
      });
      const set = v => setState(prev => {
        const next = typeof v === "function" ? v(prev) : v;
        try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
        return next;
      });
      return [state, set];
    }

    // ─────────────────────────────────────────────────────
    //  HILFSFUNKTIONEN
    // ─────────────────────────────────────────────────────
    function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
    function todayISO() { return new Date().toISOString().split("T")[0]; }

    function fmtLong(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").toLocaleDateString("de-DE",
        { weekday:"long", day:"numeric", month:"long", year:"numeric" });
    }
    function fmtShort(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").toLocaleDateString("de-DE",
        { day:"numeric", month:"short", year:"numeric" });
    }
    function fmtWeekday(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").toLocaleDateString("de-DE", { weekday:"long" });
    }
    function fmtDayMonth(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").toLocaleDateString("de-DE",
        { day:"numeric", month:"long" });
    }
    function fmtYear(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").getFullYear();
    }

    async function geocode(query) {
      if (!query) return null;
      try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
        const res  = await fetch(url, { headers: { "Accept-Language": "de" } });
        const data = await res.json();
        if (data?.[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      } catch {}
      return null;
    }

    // ─────────────────────────────────────────────────────
    //  DESIGN TOKENS
    // ─────────────────────────────────────────────────────
    const C = {
      bg:          "#F7F4EF",
      card:        "#FFFFFF",
      accent:      "#C8874A",
      accentBg:    "#FDF3E8",
      text:        "#1C1916",
      textSec:     "#8A847C",
      border:      "#EAE6E0",
      danger:      "#D94F4F",
    };

    // ─────────────────────────────────────────────────────
    //  UI GRUNDBAUSTEINE
    // ─────────────────────────────────────────────────────
    function Btn({ children, onClick, full, variant, small, danger }) {
      const bg  = danger ? C.danger : variant === "ghost" ? "#F0EDE8" : C.accent;
      const col = danger || variant !== "ghost" ? "#fff" : C.text;
      return (
        <button onClick={onClick} style={{
          background: bg, color: col, border: "none", borderRadius: 14,
          padding: small ? "8px 16px" : "13px 20px",
          fontSize: small ? 13 : 15, fontWeight: 600, fontFamily: "inherit",
          cursor: "pointer", width: full ? "100%" : "auto",
          WebkitTapHighlightColor: "transparent", transition: "opacity .15s"
        }}>{children}</button>
      );
    }

    function Field({ label, children }) {
      return (
        <div style={{ marginBottom: 16 }}>
          {label && <div style={{ fontSize: 11, fontWeight: 700, color: C.textSec,
            letterSpacing: 0.7, marginBottom: 6, textTransform: "uppercase" }}>{label}</div>}
          {children}
        </div>
      );
    }

    function Input({ value, onChange, placeholder, type="text", onKeyDown }) {
      return (
        <input type={type} value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder} onKeyDown={onKeyDown}
          style={{ width:"100%", background:"#F7F4EF", border:`1px solid ${C.border}`,
            borderRadius:12, padding:"11px 14px", fontSize:15, color:C.text,
            outline:"none", fontFamily:"inherit" }} />
      );
    }

    function Textarea({ value, onChange, placeholder, rows=6 }) {
      return (
        <textarea value={value} onChange={e => onChange(e.target.value)}
          placeholder={placeholder} rows={rows}
          style={{ width:"100%", background:"#F7F4EF", border:`1px solid ${C.border}`,
            borderRadius:12, padding:"11px 14px", fontSize:15, color:C.text,
            outline:"none", fontFamily:"inherit", lineHeight:1.75 }} />
      );
    }

    function Sheet({ title, onClose, children }) {
      return (
        <div onClick={e => e.target===e.currentTarget && onClose()}
          style={{ position:"fixed", inset:0, background:"rgba(28,25,22,0.45)",
            zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
          <div style={{ background:C.card, borderRadius:"24px 24px 0 0", width:"100%",
            maxWidth:620, padding:"24px 20px",
            paddingBottom:"calc(28px + env(safe-area-inset-bottom))",
            maxHeight:"92vh", overflowY:"auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"center", marginBottom:20 }}>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:21,
                fontWeight:700, color:C.text }}>{title}</div>
              <button onClick={onClose} style={{ background:"#F0EDE8", border:"none",
                borderRadius:"50%", width:32, height:32, cursor:"pointer",
                fontSize:15, color:C.textSec, display:"flex", alignItems:"center",
                justifyContent:"center" }}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  KARTEN-VORSCHAU  (Leaflet + OpenStreetMap)
    // ─────────────────────────────────────────────────────
    function MapPreview({ lat, lng }) {
      const ref  = useRef(null);
      const map  = useRef(null);

      useEffect(() => {
        if (!lat || !lng || !ref.current) return;
        if (map.current) {
          map.current.setView([lat, lng], 13);
          return;
        }
        const m = L.map(ref.current, {
          zoomControl: false, attributionControl: false,
          dragging: false, scrollWheelZoom: false, doubleClickZoom: false
        });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(m);
        L.circleMarker([lat, lng], {
          radius: 9, color: "#fff", weight: 2,
          fillColor: C.accent, fillOpacity: 1
        }).addTo(m);
        m.setView([lat, lng], 13);
        map.current = m;
        return () => { if (map.current) { map.current.remove(); map.current = null; } };
      }, [lat, lng]);

      if (!lat || !lng) return null;
      return (
        <div ref={ref} style={{ height:170, borderRadius:14, overflow:"hidden",
          marginTop:10, border:`1px solid ${C.border}` }} />
      );
    }

    // ─────────────────────────────────────────────────────
    //  ROUTEN-KARTE  (KML-Import + Leaflet)
    // ─────────────────────────────────────────────────────
    function RouteMap({ tripId, entries, route, onSaveRoute }) {
      const mapRef  = useRef(null);
      const mapInst = useRef(null);
      const lgRef   = useRef(null);
      const [error, setError] = useState("");
      const pins = entries.filter(e => e.lat && e.lng);

      useEffect(() => {
        if (!mapRef.current) return;
        const m = L.map(mapRef.current, { zoomControl:true, attributionControl:false });
        L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", { maxZoom:17 }).addTo(m);
        mapInst.current = m;
        lgRef.current   = L.layerGroup().addTo(m);
        m.setView([20, 0], 2);
        return () => { m.remove(); mapInst.current = null; lgRef.current = null; };
      }, []);

      useEffect(() => {
        if (!mapInst.current || !lgRef.current) return;
        const m  = mapInst.current;
        const lg = lgRef.current;
        lg.clearLayers();
        const allLatLngs = [];

        if (route) {
          const gl = L.geoJSON(route, {
            style: () => ({ color:C.accent, weight:4, opacity:0.85 }),
            pointToLayer: (f, ll) => L.circleMarker(ll, {
              radius:5, color:C.accent, fillColor:C.accent, fillOpacity:0.7, weight:1
            })
          }).addTo(lg);
          try {
            const b = gl.getBounds();
            if (b.isValid()) allLatLngs.push(b.getNorthEast(), b.getSouthWest());
          } catch {}
        }

        pins.forEach(e => {
          const mk = L.circleMarker([e.lat, e.lng], {
            radius:9, color:"#fff", weight:2.5, fillColor:C.accent, fillOpacity:1
          }).addTo(lg);
          if (e.location || e.date) mk.bindPopup(`<b>${e.location||""}</b>${e.date?"<br/>"+fmtShort(e.date):""}`);
          allLatLngs.push(L.latLng(e.lat, e.lng));
        });

        m.invalidateSize();
        if (allLatLngs.length > 0) {
          setTimeout(() => { try { m.invalidateSize(); m.fitBounds(L.latLngBounds(allLatLngs), { padding:[24,24], maxZoom:13 }); } catch {} }, 50);
        }
      }, [route, pins.length]);

      const parseAndSave = (text, format) => {
        try {
          const doc = new DOMParser().parseFromString(text, "text/xml");
          const features = [];
          if (format === "kml") {
            doc.querySelectorAll("LineString > coordinates").forEach(el => {
              const coords = el.textContent.trim().split(/\s+/).map(c => {
                const p = c.split(",").map(Number);
                return (p.length >= 2 && !isNaN(p[0]) && !isNaN(p[1])) ? [p[0], p[1]] : null;
              }).filter(Boolean);
              if (coords.length > 1) features.push({
                type:"Feature", geometry:{ type:"LineString", coordinates:coords }, properties:{}
              });
            });
            doc.querySelectorAll("Point > coordinates").forEach(el => {
              const p = el.textContent.trim().split(",").map(Number);
              if (p.length >= 2 && !isNaN(p[0]) && !isNaN(p[1])) features.push({
                type:"Feature", geometry:{ type:"Point", coordinates:[p[0],p[1]] }, properties:{}
              });
            });
          } else {
            // GPX: getElementsByTagName ignoriert XML-Namespaces
            const getEl = name => Array.from(doc.getElementsByTagName(name));
            ["trkseg", "rte"].forEach(seg => {
              getEl(seg).forEach(segEl => {
                const tag = seg === "trkseg" ? "trkpt" : "rtept";
                const coords = Array.from(segEl.getElementsByTagName(tag)).map(pt => {
                  const lat = parseFloat(pt.getAttribute("lat"));
                  const lon = parseFloat(pt.getAttribute("lon"));
                  return (!isNaN(lat) && !isNaN(lon)) ? [lon, lat] : null;
                }).filter(Boolean);
                if (coords.length > 1) features.push({
                  type:"Feature", geometry:{ type:"LineString", coordinates:coords }, properties:{}
                });
              });
            });
            getEl("wpt").forEach(pt => {
              const lat = parseFloat(pt.getAttribute("lat"));
              const lon = parseFloat(pt.getAttribute("lon"));
              if (!isNaN(lat) && !isNaN(lon)) features.push({
                type:"Feature", geometry:{ type:"Point", coordinates:[lon, lat] }, properties:{}
              });
            });
          }
          if (features.length === 0) {
            setError(`Keine Route in der ${format.toUpperCase()}-Datei gefunden.`);
            return;
          }
          onSaveRoute(tripId, { type:"FeatureCollection", features, _source: format==="gpx" ? text : null, _format: format });
        } catch { setError(`${format.toUpperCase()}-Datei konnte nicht gelesen werden.`); }
      };

      const handleFile = (ev, format) => {
        const file = ev.target.files[0]; if (!file) return;
        setError("");
        const reader = new FileReader();
        reader.onload = e => { parseAndSave(e.target.result, format); ev.target.value = ""; };
        reader.readAsText(file);
      };

      const openGPX = async () => {
        if (!route?._source) return;
        const blob = new Blob([route._source], { type:"application/gpx+xml" });
        const file = new File([blob], "route.gpx", { type:"application/gpx+xml" });
        if (navigator.canShare && navigator.canShare({ files:[file] })) {
          try { await navigator.share({ files:[file], title:"Route" }); return; } catch {}
        }
        // Fallback: normaler Download
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "route.gpx";
        a.click(); URL.revokeObjectURL(url);
      };

      const btnStyle = { display:"inline-flex", alignItems:"center", gap:8, cursor:"pointer",
        background:C.accentBg, border:`1px dashed ${C.accent}`, borderRadius:10,
        padding:"8px 14px", fontSize:13, color:C.accent, fontWeight:600, userSelect:"none" };

      return (
        <div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:12 }}>
            <label style={btnStyle}>
              🗺️ KML importieren
              <input type="file" accept=".kml" style={{ display:"none" }}
                onChange={ev => handleFile(ev, "kml")} />
            </label>
            <label style={btnStyle}>
              📍 GPX importieren
              <input type="file" accept=".gpx" style={{ display:"none" }}
                onChange={ev => handleFile(ev, "gpx")} />
            </label>
            {route?._source && (
              <button onClick={openGPX} style={{...btnStyle,
                background:C.accentBg, border:`1px solid ${C.accent}` }}>
                📤 In MapOut öffnen
              </button>
            )}
            {route && (
              <button onClick={() => onSaveRoute(tripId, null)} style={{
                background:"none", border:"none", color:C.danger, fontSize:13,
                cursor:"pointer", fontFamily:"inherit", fontWeight:600,
                marginLeft:"auto", alignSelf:"center" }}>
                Route entfernen
              </button>
            )}
          </div>
          {error && <div style={{ color:C.danger, fontSize:13, marginBottom:10 }}>{error}</div>}
          <div ref={mapRef} style={{ height:420, borderRadius:14, overflow:"hidden",
            border:`1px solid ${C.border}`, marginBottom:12 }} />
          {pins.length > 0 && (
            <div style={{ fontSize:12, color:C.textSec, marginBottom:12 }}>
              {pins.length} {pins.length===1?"Eintrag":"Einträge"} mit GPS-Koordinaten eingezeichnet
            </div>
          )}
          {!route && pins.length === 0 && (
            <div style={{ textAlign:"center", padding:"20px 0 8px", color:C.textSec }}>
              <div style={{ fontSize:13 }}>Noch keine Route oder GPS-Einträge vorhanden</div>
            </div>
          )}
          <div style={{ padding:14, background:C.accentBg, borderRadius:12,
            border:`1px solid ${C.border}`, fontSize:12, color:C.textSec, lineHeight:1.7 }}>
            <b style={{ color:C.text }}>Route aus Google Maps exportieren:</b><br/>
            <b>KML:</b> maps.google.com/mymaps → Route erstellen → ⋮ → In KML exportieren<br/>
            <b>GPX:</b> Google Maps Timeline → Einstellungen → Standortverlauf exportieren
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  EINTRAG BEARBEITEN
    // ─────────────────────────────────────────────────────
    function EntryEdit({ entry, tripId, onSave, onClose }) {
      const [date,     setDate]     = useState(entry?.date     || todayISO());
      const [location, setLocation] = useState(entry?.location || "");
      const [lat,      setLat]      = useState(entry?.lat      || null);
      const [lng,      setLng]      = useState(entry?.lng      || null);
      const [text,     setText]     = useState(entry?.text     || "");
      const [photos,   setPhotos]   = useState(entry?.photos   || []);
      const [photoData,setPhotoData]= useState({});
      const [geocoding,setGeocoding]= useState(false);
      const fileRef = useRef(null);

      useEffect(() => {
        if (photos.length) dbGetPhotos(photos.map(p => p.id)).then(setPhotoData);
      }, []);

      const doGeocode = async () => {
        if (!location) return;
        setGeocoding(true);
        const r = await geocode(location);
        if (r) { setLat(r.lat); setLng(r.lng); }
        setGeocoding(false);
      };

      const addPhotos = async e => {
        for (const file of Array.from(e.target.files)) {
          const id = uid();
          const dataUrl = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = ev => res(ev.target.result);
            reader.readAsDataURL(file);
          });
          await dbSavePhoto(id, dataUrl);
          setPhotos(prev => [...prev, { id, caption:"" }]);
          setPhotoData(prev => ({ ...prev, [id]: dataUrl }));
        }
        e.target.value = "";
      };

      const delPhoto = async id => {
        await dbDeletePhoto(id);
        setPhotos(prev => prev.filter(p => p.id !== id));
        setPhotoData(prev => { const n={...prev}; delete n[id]; return n; });
      };

      const updCaption = (id, caption) =>
        setPhotos(prev => prev.map(p => p.id===id ? {...p, caption} : p));

      const save = () => {
        if (!date) return;
        onSave({ id: entry?.id||uid(), tripId, date, location, lat, lng,
          text, photos, createdAt: entry?.createdAt||Date.now() });
        onClose();
      };

      const generatePDF = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });

        const PW = 210, PH = 297;
        const ML = 18, MR = 18, MT = 8, MB = 16;
        const CW = PW - ML - MR;
        const BOTTOM = PH - MB;
        let y = MT;

        const newPageIfNeeded = h => {
          if (y + h > BOTTOM) { doc.addPage(); y = MT; }
        };

        const setFont = (size, style='normal', color=[28,25,22]) => {
          doc.setFontSize(size);
          doc.setFont('helvetica', style);
          doc.setTextColor(...color);
        };

        // ── Akzentbalken oben ──
        doc.setFillColor(200, 135, 74);
        doc.rect(0, 0, PW, 3.5, 'F');
        y = 14;

        // ── Label ──
        setFont(7.5, 'normal', [160,150,140]);
        doc.text('REISETAGEBUCH', ML, y);
        y += 7;

        // ── Wochentag ──
        setFont(10, 'bold', [200,135,74]);
        doc.text(fmtWeekday(date).toUpperCase(), ML, y);
        y += 7.5;

        // ── Datum groß ──
        setFont(26, 'bold', [28,25,22]);
        doc.text(fmtDayMonth(date), ML, y);
        y += 8;

        // ── Jahr ──
        setFont(11, 'normal', [138,132,124]);
        doc.text(String(fmtYear(date)), ML, y);
        y += 7;

        // ── Ort ──
        if (location) {
          setFont(11, 'normal', [138,132,124]);
          doc.text('Ort: ' + location, ML, y);
          y += 7;
        }

        // ── Trennlinie ──
        y += 2;
        doc.setDrawColor(220, 215, 208);
        doc.setLineWidth(0.4);
        doc.line(ML, y, ML + CW, y);
        y += 9;

        // ── Text ──
        if (text) {
          setFont(11, 'normal', [28,25,22]);
          doc.setLineHeightFactor(1.6);
          const lines = doc.splitTextToSize(text, CW);
          const lh = 6.2;
          for (const line of lines) {
            newPageIfNeeded(lh);
            doc.text(line, ML, y);
            y += lh;
          }
          y += 7;
        }

        // ── Fotos ──
        for (const p of photos) {
          const rawUrl = photoData[p.id];
          if (!rawUrl) continue;
          const dataUrl = await fixImageOrientation(rawUrl);

          const dims = await new Promise(res => {
            const img = new Image();
            img.onload = () => res({ w: img.naturalWidth, h: img.naturalHeight });
            img.src = dataUrl;
          });

          const maxW = CW;
          const maxH = 140;
          let iw = maxW;
          let ih = (dims.h / dims.w) * iw;
          if (ih > maxH) { ih = maxH; iw = (dims.w / dims.h) * ih; }

          const captionH = p.caption ? 10 : 0;
          newPageIfNeeded(ih + captionH + 8);

          const ix = ML + (CW - iw) / 2;
          doc.addImage(dataUrl, 'JPEG', ix, y, iw, ih, undefined, 'MEDIUM');
          y += ih + 3;

          if (p.caption) {
            setFont(9, 'italic', [138,132,124]);
            const capLines = doc.splitTextToSize(p.caption, CW);
            capLines.forEach(cl => {
              doc.text(cl, PW / 2, y, { align:'center' });
              y += 5;
            });
          }
          y += 7;
        }

        // ── Seitenfußzeile ──
        const total = doc.internal.getNumberOfPages();
        for (let i = 1; i <= total; i++) {
          doc.setPage(i);
          setFont(7.5, 'normal', [180,174,168]);
          doc.text('Reisetagebuch', ML, PH - 8);
          if (location) doc.text(location, PW / 2, PH - 8, { align:'center' });
          doc.text(fmtShort(date), ML + CW, PH - 8, { align:'right' });
          if (total > 1) doc.text(`${i} / ${total}`, PW / 2, PH - 3, { align:'center' });
          // Akzentlinie unten
          doc.setDrawColor(200,135,74);
          doc.setLineWidth(0.5);
          doc.line(ML, PH - 12, ML + CW, PH - 12);
        }

        const fname = `Tagebuch_${date}${location ? '_' + location.replace(/[^a-zA-Z0-9]/g,'_') : ''}.pdf`;
        doc.save(fname);
      };

      return (
        <Sheet title={entry ? "Eintrag bearbeiten" : "Neuer Eintrag"} onClose={onClose}>
          <Field label="Datum">
            <Input type="date" value={date} onChange={setDate} />
          </Field>

          <Field label="Ort / Stadt">
            <div style={{ display:"flex", gap:8 }}>
              <input value={location} onChange={e => setLocation(e.target.value)}
                placeholder="z.B. Rom, Florenz, Paris…"
                onKeyDown={e => e.key==="Enter" && doGeocode()}
                style={{ flex:1, background:"#F7F4EF", border:`1px solid ${C.border}`,
                  borderRadius:12, padding:"11px 14px", fontSize:15, color:C.text,
                  outline:"none", fontFamily:"inherit" }} />
              <button onClick={doGeocode} style={{
                background: C.accent, color:"#fff", border:"none", borderRadius:12,
                padding:"11px 16px", cursor:"pointer", fontSize:13,
                fontFamily:"inherit", fontWeight:600, whiteSpace:"nowrap"
              }}>{geocoding ? "…" : "🗺️ Karte"}</button>
            </div>
            <MapPreview lat={lat} lng={lng} />
          </Field>

          <Field label="Tagebucheintrag">
            <Textarea value={text} onChange={setText}
              placeholder="Was hast du heute erlebt, gesehen, gefühlt…" rows={8} />
          </Field>

          <Field label="Fotos">
            <input ref={fileRef} type="file" accept="image/*" multiple
              onChange={addPhotos} style={{ display:"none" }} />
            {photos.map(p => (
              <PhotoItem key={p.id} meta={p} dataUrl={photoData[p.id]}
                onDelete={delPhoto} onCaption={updCaption} />
            ))}
            <button onClick={() => fileRef.current.click()} style={{
              width:"100%", padding:14, borderRadius:14,
              border:`2px dashed ${C.border}`, background:"transparent",
              color:C.textSec, cursor:"pointer", fontSize:14, fontFamily:"inherit",
              display:"flex", alignItems:"center", justifyContent:"center", gap:8
            }}>📷 Fotos aus Mediathek hinzufügen</button>
          </Field>

          <div style={{ display:"flex", gap:10 }}>
            <Btn onClick={save} full>Speichern</Btn>
          </div>
        </Sheet>
      );
    }
