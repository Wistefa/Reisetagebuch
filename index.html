    // ─────────────────────────────────────────────────────
    //  LAYOUT-EDITOR  (PDF mit Textfluss um Fotos)
    // ─────────────────────────────────────────────────────
    const PREVIEW_CW = 500;   // px content width in A4 preview
    const PDF_CW     = 174;   // mm content width in PDF  (210 - 18 - 18)
    const PX_TO_MM   = PDF_CW / PREVIEW_CW;

    function LayoutEditor({ entry, tripName, onClose, onSaveLayout }) {
      const [photoData,  setPhotoData]  = useState({});
      const [layout,     setLayout]     = useState(entry.layout || []);
      const [selId,      setSelId]      = useState(null);
      const [generating, setGenerating] = useState(false);
      const [saved,      setSaved]      = useState(false);

      const paras = stripEmoji(entry.text || '').split(/\n+/).filter(p => p.trim());
      const [pendingId, setPendingId] = useState(null); // Touch: ausgewähltes Foto wartet auf Platzierung

      useEffect(() => {
        if (entry.photos?.length)
          dbGetPhotos(entry.photos.map(p => p.id)).then(setPhotoData);
      }, [entry]);

      const placePhoto = (photoId, afterPara, fl = 'right') => {
        setLayout(prev => {
          const without = prev.filter(l => l.photoId !== photoId);
          return [...without, { id: uid(), photoId, afterPara, float: fl, widthPx: 200 }];
        });
        setPendingId(null);
      };
      const updItem  = (id, patch) => setLayout(prev => prev.map(l => l.id===id ? {...l,...patch} : l));
      const delItem  = (id) => { setLayout(prev => prev.filter(l => l.id!==id)); setSelId(null); };
      const sel      = layout.find(l => l.id===selId);
      const placedIds = new Set(layout.map(l => l.photoId));

      // ── PDF generation with float layout ─────────────────
      const generatePDF = async () => {
        setGenerating(true);
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
          const PW=210, PH=297, ML=18, MR=18, MT=18, MB=18;
          const CW = PW-ML-MR;
          const BOTTOM = PH-MB;
          const LH = 6.2, PHOTO_GAP = 4;
          let y = MT;

          const sf = (sz, st='normal', col=[28,25,22]) => {
            doc.setFontSize(sz); doc.setFont('helvetica',st); doc.setTextColor(...col);
          };
          const chk = h => { if (y+h > BOTTOM) { doc.addPage(); y=MT; } };

          // Header
          doc.setFillColor(200,135,74); doc.rect(0,0,PW,3.5,'F');
          y=14;
          sf(7.5,'normal',[160,150,140]);
          doc.text('REISETAGEBUCH'+(tripName?' · '+tripName.toUpperCase():''), ML, y); y+=7;
          sf(10,'bold',[200,135,74]);
          doc.text(fmtWeekday(entry.date).toUpperCase(), ML, y); y+=7.5;
          sf(26,'bold',[28,25,22]);
          doc.text(fmtDayMonth(entry.date), ML, y); y+=8;
          sf(11,'normal',[138,132,124]);
          doc.text(String(fmtYear(entry.date)), ML, y); y+=7;
          const _cleanLoc = stripEmoji(entry.location || '');
          if (_cleanLoc) { sf(11,'normal',[138,132,124]); doc.text(doc.splitTextToSize('Ort: '+_cleanLoc, CW)[0], ML, y); y+=7; }
          y+=2;
          doc.setDrawColor(220,215,208); doc.setLineWidth(0.4);
          doc.line(ML, y, ML+CW, y); y+=9;

          // Load image dims helper
          const dims = async (url) => new Promise(res => {
            const img=new Image(); img.onload=()=>res({w:img.naturalWidth,h:img.naturalHeight}); img.src=url;
          });

          // Group layout items by afterPara
          const byPara = {};
          layout.forEach(it => { (byPara[it.afterPara]||(byPara[it.afterPara]=[])).push(it); });

          // Render a single float photo block; returns endY
          const renderPhoto = async (item, startY) => {
            const rawUrl = photoData[item.photoId]; if (!rawUrl) return startY;
            const url = await fixImageOrientation(rawUrl);
            const pMeta = (entry.photos||[]).find(p=>p.id===item.photoId);
            const d = await dims(url);
            const maxW = item.float==='center' ? CW : Math.min(item.widthPx*PX_TO_MM, CW*0.55);
            const photoW = Math.min(maxW, CW);
            const photoH = (d.h/d.w)*photoW;
            const capLines = pMeta?.caption ? doc.splitTextToSize(stripEmoji(pMeta.caption), photoW) : [];
            const capH = capLines.length ? capLines.length*4.5+2 : 0;

            if (item.float==='center') {
              chk(photoH+capH+6);
              doc.addImage(url,'JPEG',ML+(CW-photoW)/2,y,photoW,photoH,undefined,'MEDIUM');
              let cy=y+photoH+3;
              if (capLines.length) {
                sf(8,'italic',[138,132,124]);
                capLines.forEach(cl => { doc.text(cl, PW/2, cy, {align:'center'}); cy+=4.5; });
              }
              y = cy+4; return y;
            }
            // float left/right
            const photoX = item.float==='left' ? ML : ML+CW-photoW;
            doc.addImage(url,'JPEG',photoX,startY,photoW,photoH,undefined,'MEDIUM');
            if (capLines.length) {
              sf(8,'italic',[138,132,124]);
              capLines.forEach((cl,ci) => doc.text(cl, photoX+photoW/2, startY+photoH+2+ci*4.5, {align:'center'}));
            }
            return startY+photoH+capH+(capLines.length?2:0)+3;
          };

          // Render paragraph text with optional side float
          const renderPara = async (text, floatItem) => {
            if (!floatItem) {
              sf(11,'normal',[28,25,22]);
              const lines = doc.splitTextToSize(text, CW - 2);
              for (const l of lines) { chk(LH); sf(11,'normal',[28,25,22]); doc.text(l,ML,y); y+=LH; }
              y+=3; return;
            }
            if (floatItem.float==='center') {
              await renderPhoto(floatItem, y);
              sf(11,'normal',[28,25,22]);
              const lines = doc.splitTextToSize(text, CW - 2);
              for (const l of lines) { chk(LH); doc.text(l,ML,y); y+=LH; }
              y+=3; return;
            }
            // side float
            const rawUrl2 = photoData[floatItem.photoId];
            if (!rawUrl2) { await renderPara(text, null); return; }
            const url = await fixImageOrientation(rawUrl2);
            const d     = await dims(url);
            const pMeta = (entry.photos||[]).find(p=>p.id===floatItem.photoId);
            const photoW = Math.min(floatItem.widthPx*PX_TO_MM, CW*0.55);
            const photoH = (d.h/d.w)*photoW;
            const capLines = pMeta?.caption ? doc.splitTextToSize(stripEmoji(pMeta.caption), photoW) : [];
            const capH = capLines.length ? capLines.length*4.5+2 : 0;
            const photoTotalH = photoH+capH+3;

            const photoX = floatItem.float==='left' ? ML : ML+CW-photoW;
            const textX  = floatItem.float==='left' ? ML+photoW+PHOTO_GAP : ML;
            const textW  = CW-photoW-PHOTO_GAP;

            chk(Math.min(photoTotalH, 50)+LH);
            const blockStart = y;
            doc.addImage(url,'JPEG',photoX,blockStart,photoW,photoH,undefined,'MEDIUM');
            if (capLines.length) {
              sf(8,'italic',[138,132,124]);
              capLines.forEach((cl,ci)=>doc.text(cl, photoX+photoW/2, blockStart+photoH+2+ci*4.5, {align:'center'}));
            }
            const photoEndY = blockStart+photoTotalH;

            sf(11,'normal',[28,25,22]);
            const sideLines = doc.splitTextToSize(text, textW - 1);
            let ly = blockStart;
            let si = 0;
            // lines next to photo
            while (si < sideLines.length && ly+LH <= photoEndY+LH) {
              doc.text(sideLines[si], textX, ly); ly+=LH; si++;
            }
            // remaining lines full width below photo
            y = Math.max(ly, photoEndY);
            // track char offset reliably (join(' ') fails with multi-space or newlines)
            let charOffset = 0;
            for (let k = 0; k < si; k++) {
              charOffset += sideLines[k].length;
              while (charOffset < text.length && /\s/.test(text[charOffset])) charOffset++;
            }
            const remainText = text.slice(charOffset);
            if (remainText) {
              const remLines = doc.splitTextToSize(remainText, CW - 2);
              for (const l of remLines) { chk(LH); sf(11,'normal',[28,25,22]); doc.text(l,ML,y); y+=LH; }
            }
            y+=3;
          };

          // Before-all photos (afterPara === -1)
          for (const it of (byPara[-1]||[])) await renderPhoto(it, y);

          // Paragraphs
          for (let i=0; i<paras.length; i++) {
            const items = byPara[i]||[];
            await renderPara(paras[i], items[0]||null);
            // extra photos at same position (2nd, 3rd…)
            for (let j=1; j<items.length; j++) await renderPhoto(items[j], y);
          }

          // After-last photos (afterPara === paras.length)
          for (const it of (byPara[paras.length]||[])) await renderPhoto(it, y);

          // Footer
          const total = doc.internal.getNumberOfPages();
          for (let i=1; i<=total; i++) {
            doc.setPage(i);
            sf(7.5,'normal',[180,174,168]);
            doc.text('Reisetagebuch', ML, PH-8);
            if (_cleanLoc) doc.text(_cleanLoc, PW/2, PH-8, {align:'center'});
            doc.text(fmtShort(entry.date), ML+CW, PH-8, {align:'right'});
            if (total>1) doc.text(`${i} / ${total}`, PW/2, PH-3, {align:'center'});
            doc.setDrawColor(200,135,74); doc.setLineWidth(0.5);
            doc.line(ML, PH-12, ML+CW, PH-12);
          }

          const fname = `Tagebuch_${entry.date}${entry.location?'_'+entry.location.replace(/[^a-zA-Z0-9]/g,'_'):''}.pdf`;
          doc.save(fname);
        } finally { setGenerating(false); }
      };

      // ── Render ────────────────────────────────────────────
      const baseStyle = {
        position:'fixed', inset:0, zIndex:300,
        background:'#1a1a2e', display:'flex', flexDirection:'column',
        fontFamily:"'DM Sans', sans-serif",
      };

      const topBar = {
        display:'flex', alignItems:'center', gap:12, padding:'10px 16px',
        background:'#16213e', borderBottom:'1px solid rgba(255,255,255,.08)',
        flexShrink:0,
      };

      return (
        <div style={baseStyle}>
          {/* Top bar */}
          <div style={topBar}>
            <button onClick={onClose} style={{ background:'rgba(255,255,255,.08)', border:'none', color:'#e0e0e0', borderRadius:8, padding:'6px 14px', cursor:'pointer', fontSize:13 }}>← Zurück</button>
            <span style={{ flex:1, fontWeight:600, fontSize:15, color:'#e0e0e0' }}>Layout-Editor</span>
            <span style={{ fontSize:12, color:'rgba(255,255,255,.45)' }}>
              {fmtWeekday(entry.date)}, {fmtDayMonth(entry.date)} {fmtYear(entry.date)}{entry.location ? ' · '+entry.location : ''}
            </span>
            <button onClick={() => { onSaveLayout(layout); setSaved(true); setTimeout(()=>setSaved(false),2000); }} style={{
              background: saved ? 'rgba(80,180,100,.3)' : 'rgba(255,255,255,.08)',
              color: saved ? '#6fda8a' : '#e0e0e0', border: saved ? '1px solid #6fda8a' : '1px solid rgba(255,255,255,.15)',
              borderRadius:8, padding:'8px 16px', fontSize:13, fontWeight:600, cursor:'pointer'
            }}>{saved ? '✓ Gespeichert' : '💾 Layout speichern'}</button>
            <button onClick={generating ? null : generatePDF} style={{
              background: generating ? 'rgba(200,135,74,.4)' : 'linear-gradient(135deg,#c8874a,#a06030)',
              color:'white', border:'none', borderRadius:8, padding:'8px 20px',
              fontSize:13, fontWeight:700, cursor: generating ? 'not-allowed' : 'pointer'
            }}>{generating ? '⏳ Erstelle PDF…' : '📄 PDF erstellen'}</button>
          </div>

          <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

            {/* Left: unplaced photos */}
            <div style={{ width:220, background:'#16213e', borderRight:'1px solid rgba(255,255,255,.08)', overflowY:'auto', padding:12, flexShrink:0 }}>
              <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:1.2, color:'rgba(255,255,255,.4)', marginBottom:6 }}>Fotos</div>
              {pendingId && (
                <div style={{ background:'rgba(200,135,74,.2)', border:'1px solid #c8874a', borderRadius:8, padding:'7px 8px', marginBottom:8, fontSize:10, color:'#c8874a', textAlign:'center' }}>
                  👆 Jetzt Drop-Zone im Text antippen
                </div>
              )}
              {(entry.photos||[]).map(p => {
                const placed = placedIds.has(p.id);
                const isPending = pendingId === p.id;
                return (
                  <div key={p.id}
                    draggable={!placed}
                    onDragStart={e => { e.dataTransfer.setData('photoId', p.id); e.dataTransfer.effectAllowed='copy'; }}
                    onClick={() => { if (!placed) setPendingId(isPending ? null : p.id); }}
                    style={{ display:'flex', alignItems:'center', gap:8, background: isPending ? 'rgba(200,135,74,.15)' : 'rgba(255,255,255,.05)',
                      borderRadius:8, padding:'7px 8px', marginBottom:6,
                      cursor: placed ? 'default' : 'pointer',
                      opacity: placed ? 0.4 : 1,
                      border: isPending ? '2px solid #c8874a' : '2px solid transparent',
                      transition:'border-color .15s' }}
                  >
                    {photoData[p.id]
                      ? <img src={photoData[p.id]} style={{ width:44, height:32, objectFit:'cover', borderRadius:4 }} />
                      : <div style={{ width:44, height:32, background:'#0f3460', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>📷</div>
                    }
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:11, color:'#e0e0e0', lineHeight:1.3 }}>{p.caption || 'Foto'}</div>
                      <div style={{ fontSize:9, color: isPending ? '#c8874a' : 'rgba(255,255,255,.35)' }}>
                        {placed ? 'platziert' : isPending ? '✓ ausgewählt' : 'antippen zum Platzieren'}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div style={{ marginTop:12, padding:10, background:'rgba(255,255,255,.04)', borderRadius:8, fontSize:10, color:'rgba(255,255,255,.4)', lineHeight:1.6 }}>
                📱 <strong style={{color:'rgba(255,255,255,.6)'}}>iPad:</strong> Foto antippen → Drop-Zone antippen<br/>
                🖥 <strong style={{color:'rgba(255,255,255,.6)'}}>Mac:</strong> Foto in Text ziehen
              </div>
            </div>

            {/* Center: A4 preview */}
            <div style={{ flex:1, overflowY:'auto', padding:'28px 20px', display:'flex', justifyContent:'center', background:'#1a1a2e' }}>
              <div style={{ width:PREVIEW_CW+80, background:'white', boxShadow:'0 8px 40px rgba(0,0,0,.6)', fontFamily:'Georgia, serif', color:'#222', flexShrink:0 }}>
                {/* Page header */}
                <div style={{ background:'linear-gradient(135deg,#1a3a5c,#2d6a8f)', color:'white', padding:'18px 40px 14px' }}>
                  <div style={{ fontSize:9, letterSpacing:3, textTransform:'uppercase', opacity:.65, fontFamily:'Arial' }}>
                    {fmtWeekday(entry.date)}
                  </div>
                  <div style={{ fontSize:28, fontWeight:700, lineHeight:1.1 }}>{fmtDayMonth(entry.date)}</div>
                  {entry.location && <div style={{ fontSize:10, opacity:.75, marginTop:3, fontFamily:'Arial' }}>📍 {entry.location}</div>}
                </div>
                <div style={{ height:2, background:'linear-gradient(90deg,#c8874a,#e8c87a,#c8874a)' }} />

                {/* Page body with drop zones */}
                <div style={{ padding:'20px 40px 32px', minHeight:700, fontSize:10.5, lineHeight:1.75, position:'relative' }}
                  onClick={e => { if (e.target === e.currentTarget) setSelId(null); }}
                >
                  {/* Drop zone before first paragraph */}
                  <DropZone afterPara={-1} onDrop={placePhoto} layout={layout} paras={paras} pendingId={pendingId} />

                  {paras.map((text, pi) => {
                    const items = layout.filter(l => l.afterPara===pi);
                    return (
                      <div key={pi} style={{ clear:'both' }}>
                        {items.map(item => (
                          <FloatPhoto key={item.id} item={item} photoData={photoData}
                            caption={(entry.photos||[]).find(p=>p.id===item.photoId)?.caption}
                            selected={selId===item.id}
                            onSelect={() => setSelId(item.id)}
                            onFloat={fl => updItem(item.id,{float:fl})}
                            onDelete={() => delItem(item.id)}
                            onResize={w => updItem(item.id,{widthPx:w})}
                          />
                        ))}
                        <p style={{ margin:0, marginBottom:12 }}>{text}</p>
                        <DropZone afterPara={pi} onDrop={placePhoto} layout={layout} paras={paras} pendingId={pendingId} />
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Right: settings */}
            <div style={{ width:190, background:'#16213e', borderLeft:'1px solid rgba(255,255,255,.08)', padding:12, overflowY:'auto', flexShrink:0 }}>
              <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:1.2, color:'rgba(255,255,255,.4)', marginBottom:10 }}>Ausgewählt</div>
              {sel ? (
                <div>
                  {photoData[sel.photoId] &&
                    <img src={photoData[sel.photoId]} style={{ width:'100%', borderRadius:8, marginBottom:10, objectFit:'cover', height:90 }} />
                  }
                  <div style={{ fontSize:11, color:'rgba(255,255,255,.5)', marginBottom:6 }}>Textfluss</div>
                  <div style={{ display:'flex', gap:5, marginBottom:12 }}>
                    {['left','center','right'].map(fl => (
                      <button key={fl} onClick={() => updItem(sel.id,{float:fl})} style={{
                        flex:1, background: sel.float===fl ? 'rgba(200,135,74,.25)' : 'rgba(255,255,255,.06)',
                        border: sel.float===fl ? '1px solid #c8874a' : '1px solid rgba(255,255,255,.1)',
                        color: sel.float===fl ? '#c8874a' : '#e0e0e0',
                        borderRadius:6, padding:'5px 2px', fontSize:10, cursor:'pointer'
                      }}>{fl==='left'?'◀ Links':fl==='center'?'Mitte':'Rechts ▶'}</button>
                    ))}
                  </div>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,.5)', marginBottom:6 }}>Breite</div>
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:12 }}>
                    <input type="range" min={100} max={450} value={sel.widthPx}
                      onChange={e => updItem(sel.id,{widthPx:+e.target.value})}
                      style={{ flex:1, accentColor:'#c8874a' }} />
                    <span style={{ fontSize:10, color:'rgba(255,255,255,.45)', minWidth:28 }}>{sel.widthPx}</span>
                  </div>
                  <div style={{ fontSize:11, color:'rgba(255,255,255,.5)', marginBottom:6 }}>Position</div>
                  <div style={{ display:'flex', gap:5, marginBottom:16 }}>
                    {[[-1,'▲ Höher'],[1,'▼ Tiefer']].map(([d,lbl]) => (
                      <button key={d} onClick={() => {
                        const newPara = Math.max(-1, Math.min(paras.length, sel.afterPara+d));
                        updItem(sel.id,{afterPara:newPara});
                      }} style={{ flex:1, background:'rgba(255,255,255,.06)', border:'1px solid rgba(255,255,255,.1)', color:'#e0e0e0', borderRadius:6, padding:'5px 4px', fontSize:10, cursor:'pointer' }}>{lbl}</button>
                    ))}
                  </div>
                  <button onClick={() => delItem(sel.id)} style={{ width:'100%', background:'none', border:'1px solid rgba(224,85,85,.3)', color:'#e05555', borderRadius:6, padding:'7px', fontSize:11, cursor:'pointer' }}>🗑 Entfernen</button>
                </div>
              ) : (
                <div style={{ fontSize:11, color:'rgba(255,255,255,.35)', textAlign:'center', paddingTop:20, lineHeight:1.6 }}>
                  Kein Foto ausgewählt.<br/>Foto anklicken um zu bearbeiten.
                </div>
              )}
            </div>
          </div>

          <div style={{ background:'#0a1628', padding:'5px 16px', fontSize:10, color:'rgba(255,255,255,.45)', display:'flex', gap:16, flexShrink:0 }}>
            <span>💡 Fotos aus der linken Liste per Drag &amp; Drop in den gelb markierten Bereich ziehen</span>
            <span>·</span>
            <span>{layout.length} von {(entry.photos||[]).length} Fotos platziert</span>
          </div>
        </div>
      );
    }

    function DropZone({ afterPara, onDrop, layout, paras, pendingId }) {
      const [over, setOver] = useState(false);
      const label = afterPara===-1 ? 'Vor dem Text' : afterPara===paras.length ? 'Nach dem Text' : `Nach Absatz ${afterPara+1}`;
      const isActive = pendingId || over;
      return (
        <div
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={e => { e.preventDefault(); setOver(false); const id=e.dataTransfer.getData('photoId'); if (id) onDrop(id, afterPara); }}
          onClick={() => { if (pendingId) onDrop(pendingId, afterPara); }}
          style={{
            height: isActive ? 44 : 8, margin:'2px 0', borderRadius:6,
            background: over ? 'rgba(200,135,74,.2)' : pendingId ? 'rgba(200,135,74,.08)' : 'transparent',
            border: over ? '2px dashed rgba(200,135,74,.7)' : pendingId ? '2px dashed rgba(200,135,74,.4)' : '2px dashed transparent',
            display:'flex', alignItems:'center', justifyContent:'center',
            transition:'height .15s, background .15s',
            fontSize:10, color:'#c8874a', cursor: pendingId ? 'pointer' : 'default',
          }}
        >{over ? `📷 Hier einfügen — ${label}` : pendingId ? `+ ${label}` : ''}</div>
      );
    }

    function FloatPhoto({ item, photoData, caption, selected, onSelect, onFloat, onDelete, onResize }) {
      const isCenter = item.float==='center';
      const w = item.widthPx;
      const h = Math.round(w*0.68);
      const floatStyle = isCenter
        ? { display:'block', margin:'8px auto', clear:'both' }
        : { float: item.float, margin: item.float==='left' ? '0 12px 8px 0' : '0 0 8px 12px', clear:'none' };

      return (
        <div
          onClick={e => { e.stopPropagation(); onSelect(); }}
          style={{ position:'relative', width:w, cursor:'pointer', ...floatStyle,
            outline: selected ? '2px solid #c8874a' : '2px solid transparent',
            borderRadius:4, transition:'outline .1s',
          }}
        >
          {selected && (
            <div style={{ position:'absolute', top:-32, left:0, display:'flex', gap:3, zIndex:10, whiteSpace:'nowrap' }}>
              {['left','center','right'].map(fl => (
                <button key={fl} onClick={e => { e.stopPropagation(); onFloat(fl); }} style={{
                  background: item.float===fl ? '#c8874a' : '#1a3a5c',
                  color:'white', border:'none', borderRadius:4, padding:'3px 7px',
                  fontSize:9, cursor:'pointer', fontFamily:'inherit',
                }}>{fl==='left'?'◀':fl==='center'?'■':'▶'}</button>
              ))}
              <button onClick={e => { e.stopPropagation(); onDelete(); }} style={{ background:'#c0392b', color:'white', border:'none', borderRadius:4, padding:'3px 7px', fontSize:9, cursor:'pointer' }}>✕</button>
            </div>
          )}
          {photoData[item.photoId]
            ? <img src={photoData[item.photoId]} style={{ width:'100%', height:h, objectFit:'cover', display:'block', borderRadius:3 }} />
            : <div style={{ width:'100%', height:h, background:'#e0d9d0', borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center', fontSize:24 }}>📷</div>
          }
          {caption && <div style={{ fontSize:8, color:'#888', fontStyle:'italic', textAlign:'center', padding:'3px 2px 0', fontFamily:'Arial' }}>{caption}</div>}
          {selected && (
            <div
              onMouseDown={e => {
                e.preventDefault(); e.stopPropagation();
                const startX=e.clientX, startW=item.widthPx;
                const mv=ev => onResize(Math.max(80, Math.min(490, startW+(ev.clientX-startX))));
                const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
                document.addEventListener('mousemove',mv);
                document.addEventListener('mouseup',up);
              }}
              onTouchStart={e => {
                e.stopPropagation();
                const startX=e.touches[0].clientX, startW=item.widthPx;
                const mv=ev => onResize(Math.max(80, Math.min(490, startW+(ev.touches[0].clientX-startX))));
                const up=()=>{ document.removeEventListener('touchmove',mv); document.removeEventListener('touchend',up); };
                document.addEventListener('touchmove',mv,{passive:true});
                document.addEventListener('touchend',up);
              }}
              style={{ position:'absolute', bottom: caption ? 16 : 0, right:-1, width:22, height:22, background:'#c8874a', borderRadius:'2px 0 4px 0', cursor:'se-resize', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, color:'#fff' }}
            >↘</div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  EINTRAG KARTE
    // ─────────────────────────────────────────────────────
    function EntryCard({ entry, onClick }) {
      const [cover, setCover] = useState(null);

      useEffect(() => {
        if (entry.photos?.length)
          dbGetPhoto(entry.photos[0].id).then(url => url && setCover(url));
      }, [entry]);

      return (
        <div onClick={onClick} style={{ background:C.card, borderRadius:18,
          marginBottom:12, overflow:"hidden", cursor:"pointer",
          boxShadow:"0 2px 14px rgba(28,25,22,0.07)",
          border:`1px solid ${C.border}` }}>
          {cover && (
            <img src={cover} alt=""
              style={{ width:"100%", height:170, objectFit:"cover", display:"block" }} />
          )}
          <div style={{ padding:"14px 16px" }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.accent,
              textTransform:"uppercase", letterSpacing:0.9, marginBottom:3 }}>
              {fmtWeekday(entry.date)}
            </div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:21,
              fontWeight:700, color:C.text, marginBottom:entry.location?4:6 }}>
              {fmtDayMonth(entry.date)}
            </div>
            {entry.location && (
              <div style={{ fontSize:13, color:C.textSec, marginBottom:entry.text?6:0 }}>
                📍 {entry.location}
              </div>
            )}
            {entry.text && (
              <div style={{ fontSize:14, color:C.textSec, lineHeight:1.6,
                overflow:"hidden", display:"-webkit-box",
                WebkitLineClamp:3, WebkitBoxOrient:"vertical" }}>
                {entry.text}
              </div>
            )}
            {entry.photos?.length > 0 && (
              <div style={{ fontSize:12, color:C.textSec, marginTop:8 }}>
                📷 {entry.photos.length} {entry.photos.length===1?"Foto":"Fotos"}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  DECKBLATT-EDITOR
    // ─────────────────────────────────────────────────────
    function CoverEditor({ trip, entries, onSave, onClose }) {
      const [photos,  setPhotos]  = useState([]);
      const [sel,     setSel]     = useState(trip.coverPhotos || []);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const items = [];
        entries.forEach(e => (e.photos||[]).forEach(p => items.push({ id:p.id, caption:p.caption, entryDate:e.date })));
        if (!items.length) { setLoading(false); return; }
        dbGetPhotos(items.map(p => p.id)).then(data => {
          setPhotos(items.filter(p => data[p.id]).map(p => ({ ...p, dataUrl: data[p.id] })));
          setLoading(false);
        });
      }, []);

      const toggle = id => setSel(prev => {
        if (prev.includes(id)) return prev.filter(x => x !== id);
        if (prev.length >= 3) return prev;
        return [...prev, id];
      });

      const base = { position:'fixed', inset:0, zIndex:320, background:'#1a1a2e',
        display:'flex', flexDirection:'column', fontFamily:"'DM Sans',sans-serif" };

      return (
        <div style={base}>
          {/* TopBar */}
          <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 16px',
            paddingTop:'calc(10px + env(safe-area-inset-top))',
            background:'#16213e', borderBottom:'1px solid rgba(255,255,255,.08)' }}>
            <button onClick={onClose}
              style={{ background:'none', border:'none', color:C.accent, fontSize:15,
                fontFamily:'inherit', fontWeight:600, cursor:'pointer', padding:'8px 0' }}>
              ← Zurück
            </button>
            <span style={{ flex:1, color:'#fff', fontWeight:700, fontSize:15 }}>
              Deckblatt-Fotos
            </span>
            <button onClick={() => onSave(sel)}
              style={{ background:C.accent, border:'none', color:'#fff', borderRadius:10,
                padding:'7px 16px', fontFamily:'inherit', fontWeight:700, fontSize:13,
                cursor:'pointer' }}>
              ✓ Speichern
            </button>
          </div>

          {/* Hinweis */}
          <div style={{ padding:'10px 16px 0', color:'rgba(255,255,255,.45)', fontSize:13 }}>
            Wähle 1–3 Fotos für die Titelseite des PDFs
            <span style={{ marginLeft:8, color: sel.length>0?C.accent:'rgba(255,255,255,.3)',
              fontWeight:700 }}>({sel.length}/3 ausgewählt)</span>
          </div>

          {/* Layout-Vorschau Legende */}
          {sel.length > 0 && (
            <div style={{ padding:'8px 16px', display:'flex', gap:8, alignItems:'center' }}>
              {[1,2,3].map(n => (
                <div key={n} style={{ display:'flex', alignItems:'center', gap:5,
                  opacity: sel.length>=n ? 1 : 0.2, fontSize:12, color:'rgba(255,255,255,.6)' }}>
                  <div style={{ background:C.accent, color:'#fff', borderRadius:'50%',
                    width:20, height:20, display:'flex', alignItems:'center',
                    justifyContent:'center', fontWeight:700, fontSize:11 }}>{n}</div>
                  {n===1 ? 'Hauptfoto' : n===2 ? 'links/oben' : 'rechts/unten'}
                </div>
              ))}
            </div>
          )}

          {/* Foto-Raster */}
          {loading ? (
            <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center',
              color:'rgba(255,255,255,.35)', fontSize:15 }}>Lade Fotos…</div>
          ) : photos.length === 0 ? (
            <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center',
              color:'rgba(255,255,255,.35)', fontSize:15, textAlign:'center', padding:32 }}>
              Noch keine Fotos in dieser Reise vorhanden.<br/>
              Füge zuerst Fotos zu Tageseinträgen hinzu.
            </div>
          ) : (
            <div style={{ flex:1, overflowY:'auto', padding:16,
              display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
              {photos.map(p => {
                const idx = sel.indexOf(p.id);
                const selected = idx >= 0;
                const blocked = !selected && sel.length >= 3;
                return (
                  <div key={p.id} onClick={() => !blocked && toggle(p.id)}
                    style={{ position:'relative', aspectRatio:'1', cursor: blocked?'default':'pointer',
                      borderRadius:8, overflow:'hidden',
                      outline: selected ? `3px solid ${C.accent}` : '3px solid transparent',
                      opacity: blocked ? 0.35 : 1, transition:'opacity .15s' }}>
                    <img src={p.dataUrl} alt={p.caption||''}
                      style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                    {selected && (
                      <div style={{ position:'absolute', top:5, right:5, background:C.accent,
                        color:'#fff', borderRadius:'50%', width:24, height:24,
                        display:'flex', alignItems:'center', justifyContent:'center',
                        fontWeight:800, fontSize:13, boxShadow:'0 1px 4px rgba(0,0,0,.5)' }}>
                        {idx + 1}
                      </div>
                    )}
                    {p.entryDate && (
                      <div style={{ position:'absolute', bottom:0, left:0, right:0,
                        background:'rgba(0,0,0,.45)', color:'rgba(255,255,255,.8)',
                        fontSize:10, padding:'2px 5px' }}>
                        {fmtShort(p.entryDate)}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  REISE-DETAILSEITE
    // ─────────────────────────────────────────────────────
    function TripScreen({ trip, entries, route, onBack, onSaveEntry, onDeleteEntry, onDeleteTrip, onSaveRoute, onSaveTrip }) {
      const [tab,         setTab]         = useState("entries");
      const [view,        setView]        = useState(null);
      const [showForm,    setShowForm]    = useState(false);
      const [editEntry,   setEditEntry]   = useState(null);
      const [confirmDel,  setConfirmDel]  = useState(false);
      const [pdfRunning,      setPdfRunning]      = useState(false);
      const [layoutEntry,     setLayoutEntry]     = useState(null);
      const [showCoverEditor, setShowCoverEditor] = useState(false);

      const tripEntries = entries
        .filter(e => e.tripId === trip.id)
        .sort((a,b) => a.date.localeCompare(b.date));

      const generateTripPDF = async () => {
        if (!tripEntries.length) return;
        setPdfRunning(true);
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
          const PW=210, PH=297, ML=18, MR=18, MT=18, MB=18, CW=210-36;
          const BOTTOM = PH - MB;
          let y = MT;
          let firstPage = true;

          const newPageIfNeeded = h => {
            if (y + h > BOTTOM) { doc.addPage(); y = MT; return true; }
            return false;
          };
          const sf = (size, style='normal', color=[28,25,22]) => {
            doc.setFontSize(size); doc.setFont('helvetica', style); doc.setTextColor(...color);
          };

          // ── Deckblatt ──────────────────────────────────────
          const coverIds = trip.coverPhotos || [];
          let photoAreaH = 0;

          if (coverIds.length > 0) {
            const cpRaw = await dbGetPhotos(coverIds);
            const cpFixed = [];
            for (const id of coverIds) {
              if (cpRaw[id]) cpFixed.push(await fixImageOrientation(cpRaw[id]));
            }
            if (cpFixed.length === 1) {
              const c = await cropToRatio(cpFixed[0], 210, 165);
              doc.addImage(c, 'JPEG', 0, 0, 210, 165, undefined, 'MEDIUM');
              photoAreaH = 165;
            } else if (cpFixed.length === 2) {
              const [c1, c2] = await Promise.all([
                cropToRatio(cpFixed[0], 105, 155),
                cropToRatio(cpFixed[1], 105, 155)
              ]);
              doc.addImage(c1, 'JPEG', 0, 0, 105, 155, undefined, 'MEDIUM');
              doc.addImage(c2, 'JPEG', 105, 0, 105, 155, undefined, 'MEDIUM');
              photoAreaH = 155;
            } else {
              const [c1, c2, c3] = await Promise.all([
                cropToRatio(cpFixed[0], 210, 118),
                cropToRatio(cpFixed[1], 105, 80),
                cropToRatio(cpFixed[2], 105, 80)
              ]);
              doc.addImage(c1, 'JPEG', 0, 0, 210, 118, undefined, 'MEDIUM');
              doc.addImage(c2, 'JPEG', 0, 118, 105, 80, undefined, 'MEDIUM');
              doc.addImage(c3, 'JPEG', 105, 118, 105, 80, undefined, 'MEDIUM');
              photoAreaH = 198;
            }
          } else {
            // Kein Foto: dekorativer Farbblock oben
            doc.setFillColor(200,135,74);
            doc.rect(0, 0, PW, 5, 'F');
          }

          // Trennleiste unter den Fotos
          doc.setFillColor(200,135,74);
          doc.rect(0, photoAreaH, PW, 4, 'F');

          let dy = photoAreaH + 16;
          sf(9,'normal',[160,150,140]);
          doc.text('REISETAGEBUCH', ML, dy); dy += 11;

          sf(32,'bold',[28,25,22]);
          const titleLines = doc.splitTextToSize(stripEmoji(trip.name), CW - 2);
          titleLines.forEach((l,i) => doc.text(l, ML, dy + i*14));
          dy += titleLines.length * 14;

          if (trip.destination) {
            sf(14,'normal',[138,132,124]);
            doc.text(doc.splitTextToSize('Ziel: '+stripEmoji(trip.destination), CW)[0], ML, dy + 5);
            dy += 13;
          }

          sf(11,'normal',[138,132,124]);
          const zeitraum = fmtShort(trip.startDate) + (trip.endDate ? ' – ' + fmtShort(trip.endDate) : '');
          doc.text(zeitraum, ML, dy + 5);
          dy += 11;
          sf(10,'normal',[160,150,140]);
          doc.text(`${tripEntries.length} ${tripEntries.length===1?'Eintrag':'Einträge'}`, ML, dy + 5);

          doc.setFillColor(200,135,74);
          doc.rect(0, PH-5, PW, 5, 'F');

          // ── Einträge (je auf neuer Seite) ──────────────────
          for (let ei=0; ei < tripEntries.length; ei++) {
            const entry = tripEntries[ei];
            doc.addPage();
            y = MT;

            const eCleanLoc  = stripEmoji(entry.location || '');
            const eCleanText = stripEmoji(entry.text || '');

            // Seitenkopf: Reisename klein
            sf(7.5,'normal',[180,174,168]);
            doc.text(stripEmoji(trip.name).toUpperCase(), ML, y);
            sf(7.5,'normal',[180,174,168]);
            doc.text(`Tag ${ei+1} von ${tripEntries.length}`, ML+CW, y, {align:'right'});
            y += 7;

            // Akzentlinie
            doc.setDrawColor(200,135,74); doc.setLineWidth(0.6);
            doc.line(ML, y, ML+CW, y); y += 8;

            // Wochentag
            sf(10,'bold',[200,135,74]);
            doc.text(fmtWeekday(entry.date).toUpperCase(), ML, y); y += 7;

            // Datum groß
            sf(24,'bold',[28,25,22]);
            doc.text(fmtDayMonth(entry.date), ML, y); y += 8;

            // Jahr
            sf(11,'normal',[138,132,124]);
            doc.text(String(fmtYear(entry.date)), ML, y); y += 6;

            // Ort
            if (eCleanLoc) {
              sf(11,'normal',[138,132,124]);
              doc.text(doc.splitTextToSize('Ort: '+eCleanLoc, CW)[0], ML, y); y += 7;
            }

            // Trennlinie
            y += 2;
            doc.setDrawColor(220,215,208); doc.setLineWidth(0.4);
            doc.line(ML, y, ML+CW, y); y += 9;

            // Text
            if (eCleanText) {
              sf(11,'normal',[28,25,22]); doc.setLineHeightFactor(1.6);
              const lines = doc.splitTextToSize(eCleanText, CW - 2);
              for (const l of lines) {
                newPageIfNeeded(6.5);
                doc.text(l, ML, y); y += 6.5;
              }
              y += 6;
            }

            // Fotos
            const allPhotoIds = entry.photos?.map(p=>p.id) || [];
            const pdata = allPhotoIds.length ? await dbGetPhotos(allPhotoIds) : {};

            for (const p of (entry.photos||[])) {
              const rawUrl = pdata[p.id]; if (!rawUrl) continue;
              const dataUrl = await fixImageOrientation(rawUrl);
              const dims = await new Promise(res => {
                const img = new Image();
                img.onload = () => res({w:img.naturalWidth, h:img.naturalHeight});
                img.src = dataUrl;
              });
              let iw=CW, ih=(dims.h/dims.w)*iw;
              if (ih>150) { ih=150; iw=(dims.w/dims.h)*ih; }
              const capH = p.caption ? 12 : 0;
              newPageIfNeeded(ih + capH + 10);
              doc.addImage(dataUrl,'JPEG', ML+(CW-iw)/2, y, iw, ih, undefined,'MEDIUM');
              y += ih + 3;
              if (p.caption) {
                const cleanCap = stripEmoji(p.caption);
                sf(9,'italic',[138,132,124]);
                doc.splitTextToSize(cleanCap, CW).forEach(cl => {
                  doc.text(cl, PW/2, y, {align:'center'}); y += 5;
                });
              }
              y += 8;
            }
          }

          // ── Fußzeile auf allen Seiten ──
          const total = doc.internal.getNumberOfPages();
          for (let i=2; i<=total; i++) {
            doc.setPage(i);
            sf(7.5,'normal',[180,174,168]);
            doc.text(stripEmoji(trip.name), ML, PH-9);
            doc.text(fmtShort(trip.startDate), ML+CW, PH-9, {align:'right'});
            doc.text(`${i-1} / ${total-1}`, PW/2, PH-9, {align:'center'});
            doc.setDrawColor(234,230,224); doc.setLineWidth(0.3);
            doc.line(ML, PH-13, ML+CW, PH-13);
          }

          const fname = `Reisetagebuch_${trip.name.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,'_')}.pdf`;
          doc.save(fname);
        } finally {
          setPdfRunning(false);
        }
      };

      const doDeleteEntry = async id => {
        const e = entries.find(x => x.id===id);
        for (const p of (e?.photos||[])) await dbDeletePhoto(p.id);
        onDeleteEntry(id);
        setView(null);
      };

      const viewEntry = tripEntries.find(e => e.id===view);

      if (showCoverEditor) return (
        <CoverEditor
          trip={trip}
          entries={tripEntries}
          onClose={() => setShowCoverEditor(false)}
          onSave={coverPhotos => {
            onSaveTrip({ ...trip, coverPhotos });
            setShowCoverEditor(false);
          }}
        />
      );

      if (layoutEntry) return (
        <LayoutEditor
          entry={layoutEntry}
          tripName={trip.name}
          onClose={() => setLayoutEntry(null)}
          onSaveLayout={savedLayout => {
            const updated = { ...layoutEntry, layout: savedLayout };
            onSaveEntry(updated);
            setLayoutEntry(updated);
          }}
        />
      );

      if (viewEntry) return (
        <EntryView
          entry={viewEntry}
          onClose={() => setView(null)}
          onEdit={() => { setEditEntry(viewEntry); setShowForm(true); setView(null); }}
          onDelete={() => doDeleteEntry(view)}
          onOpenLayout={() => { setLayoutEntry(viewEntry); setView(null); }}
        />
      );

      return (
        <div style={{ background:C.bg, minHeight:"100vh" }}>
          {/* Header */}
          <div style={{ background:C.card, borderBottom:`1px solid ${C.border}`,
            padding:"0 20px", paddingTop:"env(safe-area-inset-top)" }}>
            <div style={{ height:56, display:"flex", justifyContent:"space-between",
              alignItems:"center" }}>
              <button onClick={onBack} style={{ background:"none", border:"none",
                color:C.accent, fontSize:15, fontFamily:"inherit", fontWeight:600,
                cursor:"pointer" }}>← Reisen</button>
              <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                <button onClick={() => setShowCoverEditor(true)}
                  title="Deckblatt-Fotos bearbeiten"
                  style={{ background:C.accentBg, border:`1px solid ${C.accent}`,
                    borderRadius:10, padding:"6px 11px", cursor:"pointer",
                    fontSize:12, fontWeight:700, color:C.accent, fontFamily:"inherit",
                    display:'flex', alignItems:'center', gap:4, position:'relative' }}>
                  🖼️ Deckblatt
                  {(trip.coverPhotos?.length > 0) && (
                    <span style={{ fontSize:9, background:C.accent, color:'#fff',
                      borderRadius:'50%', width:14, height:14, display:'flex',
                      alignItems:'center', justifyContent:'center', fontWeight:800 }}>
                      {trip.coverPhotos.length}
                    </span>
                  )}
                </button>
                <button onClick={generateTripPDF} disabled={pdfRunning||tripEntries.length===0}
                  style={{ background:C.accentBg, border:`1px solid ${C.accent}`,
                    borderRadius:10, padding:"6px 13px", cursor:"pointer",
                    fontSize:12, fontWeight:700, color:C.accent, fontFamily:"inherit",
                    opacity: (pdfRunning||tripEntries.length===0) ? 0.5 : 1 }}>
                  {pdfRunning ? '…wird erstellt' : '📄 PDF'}
                </button>
                <button onClick={() => setConfirmDel(true)} style={{ background:"none",
                  border:"none", fontSize:20, cursor:"pointer" }}>🗑️</button>
                <button onClick={() => { setEditEntry(null); setShowForm(true); }}
                  style={{ background:C.accent, border:"none", color:"#fff",
                    width:36, height:36, borderRadius:"50%", cursor:"pointer",
                    fontSize:20, fontWeight:700, display:"flex", alignItems:"center",
                    justifyContent:"center", boxShadow:`0 3px 12px rgba(200,135,74,.4)` }}>+</button>
              </div>
            </div>
            <div style={{ paddingBottom:16 }}>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26,
                fontWeight:800, color:C.text }}>{trip.name}</div>
              {trip.destination && (
                <div style={{ fontSize:14, color:C.textSec, marginTop:2 }}>
                  📍 {trip.destination}
                </div>
              )}
              <div style={{ fontSize:13, color:C.textSec, marginTop:4 }}>
                {fmtShort(trip.startDate)}{trip.endDate ? ` – ${fmtShort(trip.endDate)}` : ""}
                {" · "}{tripEntries.length} {tripEntries.length===1?"Eintrag":"Einträge"}
              </div>
            </div>

            <div style={{ display:"flex", gap:0, borderTop:`1px solid ${C.border}` }}>
              {[["entries","📖 Einträge"],["route","🗺️ Route"]].map(([k,l]) => (
                <button key={k} onClick={() => setTab(k)} style={{
                  background:"none", border:"none", padding:"10px 18px",
                  color: tab===k ? C.accent : C.textSec,
                  fontWeight: tab===k ? 700 : 400,
                  borderBottom: tab===k ? `2px solid ${C.accent}` : "2px solid transparent",
                  cursor:"pointer", fontFamily:"inherit", fontSize:14, transition:"color .15s"
                }}>{l}</button>
              ))}
            </div>
          </div>

          <div style={{ padding:"20px", maxWidth:620, margin:"0 auto" }}>
            {tab === "route" ? (
              <RouteMap
                tripId={trip.id}
                entries={tripEntries}
                route={route}
                onSaveRoute={onSaveRoute}
              />
            ) : tripEntries.length===0 ? (
              <div style={{ textAlign:"center", padding:"72px 0", color:C.textSec }}>
                <div style={{ fontSize:52, marginBottom:16 }}>📖</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:24,
                  color:C.text, marginBottom:8 }}>Erster Eintrag</div>
                <div style={{ fontSize:15, marginBottom:24, lineHeight:1.6 }}>
                  Halte deine Erlebnisse, Orte<br/>und Fotos fest.
                </div>
                <Btn onClick={() => { setEditEntry(null); setShowForm(true); }}>
                  Eintrag erstellen
                </Btn>
              </div>
            ) : (
              tripEntries.map(e => (
                <EntryCard key={e.id} entry={e} onClick={() => setView(e.id)} />
              ))
            )}
          </div>

          {showForm && (
            <EntryEdit
              entry={editEntry}
              tripId={trip.id}
              onSave={onSaveEntry}
              onClose={() => { setShowForm(false); setEditEntry(null); }}
            />
          )}

          {confirmDel && (
            <Sheet title="Reise löschen?" onClose={() => setConfirmDel(false)}>
              <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>
                „{trip.name}" und alle Einträge werden unwiderruflich gelöscht.
              </p>
              <div style={{ display:"flex", gap:10 }}>
                <Btn onClick={() => setConfirmDel(false)} full variant="ghost">Abbrechen</Btn>
                <Btn onClick={() => onDeleteTrip(trip.id)} full danger>Löschen</Btn>
              </div>
            </Sheet>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  REISE FORMULAR
    // ─────────────────────────────────────────────────────
    function TripForm({ trip, onSave, onClose }) {
      const [name,      setName]      = useState(trip?.name        || "");
      const [dest,      setDest]      = useState(trip?.destination || "");
      const [startDate, setStartDate] = useState(trip?.startDate   || "");
      const [endDate,   setEndDate]   = useState(trip?.endDate     || "");

      const save = () => {
        if (!name) return;
        onSave({ id: trip?.id||uid(), name, destination:dest,
          startDate, endDate, createdAt: trip?.createdAt||Date.now() });
        onClose();
      };

      return (
        <Sheet title={trip ? "Reise bearbeiten" : "Neue Reise"} onClose={onClose}>
          <Field label="Reisename">
            <Input value={name} onChange={setName} placeholder="z.B. Toskana Sommer 2025" />
          </Field>
          <Field label="Reiseziel">
            <Input value={dest} onChange={setDest} placeholder="z.B. Italien" />
          </Field>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
            <Field label="Von"><Input type="date" value={startDate} onChange={setStartDate} /></Field>
            <Field label="Bis"><Input type="date" value={endDate}   onChange={setEndDate}   /></Field>
          </div>
          <Btn onClick={save} full>Speichern</Btn>
        </Sheet>
      );
    }

    // ─────────────────────────────────────────────────────
    //  REISE KARTE  (Startseite)
    // ─────────────────────────────────────────────────────
    function TripCard({ trip, count, coverUrl, onClick }) {
      return (
        <div onClick={onClick} style={{ background:C.card, borderRadius:20,
          marginBottom:14, overflow:"hidden", cursor:"pointer",
          boxShadow:"0 4px 22px rgba(28,25,22,0.09)", border:`1px solid ${C.border}` }}>
          {coverUrl ? (
            <div style={{ position:"relative" }}>
              <img src={coverUrl} alt={trip.name}
                style={{ width:"100%", height:190, objectFit:"cover", display:"block" }} />
              <div style={{ position:"absolute", inset:0,
                background:"linear-gradient(to bottom, transparent 35%, rgba(28,25,22,0.62))" }} />
              <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:"16px" }}>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22,
                  fontWeight:800, color:"#fff" }}>{trip.name}</div>
                {trip.destination && (
                  <div style={{ fontSize:13, color:"rgba(255,255,255,0.82)", marginTop:2 }}>
                    📍 {trip.destination}
                  </div>
                )}
              </div>
            </div>
          ) : (
            <div style={{ height:100, background:`linear-gradient(135deg, ${C.accentBg}, #FFF3E0)`,
              display:"flex", alignItems:"center", justifyContent:"center", padding:"0 20px" }}>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22,
                fontWeight:800, color:C.accent, textAlign:"center" }}>{trip.name}</div>
            </div>
          )}
          <div style={{ padding:"12px 16px", display:"flex",
            justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:13, color:C.textSec }}>
              {fmtShort(trip.startDate)}{trip.endDate ? ` – ${fmtShort(trip.endDate)}` : ""}
            </div>
            <div style={{ fontSize:13, color:C.textSec }}>
              {count} {count===1?"Eintrag":"Einträge"}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  STARTSEITE
    // ─────────────────────────────────────────────────────
    function Home({ trips, entries, onSelect, onAdd, onExport, onImport }) {
      const [covers, setCovers] = useState({});

      useEffect(() => {
        trips.forEach(async trip => {
          const all = entries
            .filter(e => e.tripId===trip.id)
            .sort((a,b) => a.date.localeCompare(b.date))
            .flatMap(e => e.photos||[]);
          if (all[0]) {
            const url = await dbGetPhoto(all[0].id);
            if (url) setCovers(prev => ({ ...prev, [trip.id]: url }));
          }
        });
      }, [trips, entries]);

      return (
        <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:40 }}>
          {/* Header */}
          <div style={{ background:C.card, borderBottom:`1px solid ${C.border}`,
            padding:"0 20px", paddingTop:"env(safe-area-inset-top)" }}>
            <div style={{ height:62, display:"flex", justifyContent:"space-between",
              alignItems:"center" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:28,
                  fontWeight:800, color:C.text, lineHeight:1 }}>Reisetagebuch</div>
                <div style={{ fontSize:12, color:C.textSec, marginTop:2 }}>
                  {trips.length} {trips.length===1?"Reise":"Reisen"}
                </div>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <button onClick={onImport} title="Importieren"
                  style={{ background:"#F0EDE8", border:"none", borderRadius:"50%",
                    width:38, height:38, cursor:"pointer", fontSize:17,
                    display:"flex", alignItems:"center", justifyContent:"center" }}>📥</button>
                <button onClick={onExport} title="Exportieren"
                  style={{ background:"#F0EDE8", border:"none", borderRadius:"50%",
                    width:38, height:38, cursor:"pointer", fontSize:17,
                    display:"flex", alignItems:"center", justifyContent:"center" }}>📤</button>
                <button onClick={onAdd}
                  style={{ background:C.accent, border:"none", color:"#fff",
                    width:42, height:42, borderRadius:"50%", cursor:"pointer",
                    fontSize:22, fontWeight:700, display:"flex", alignItems:"center",
                    justifyContent:"center", boxShadow:`0 4px 16px rgba(200,135,74,.4)` }}>+</button>
              </div>
            </div>
          </div>

          <div style={{ padding:"20px", maxWidth:620, margin:"0 auto" }}>
            {trips.length===0 ? (
              <div style={{ textAlign:"center", padding:"80px 0", color:C.textSec }}>
                <div style={{ fontSize:64, marginBottom:16 }}>✈️</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26,
                  color:C.text, marginBottom:8 }}>Dein erstes Abenteuer</div>
                <div style={{ fontSize:15, marginBottom:28, lineHeight:1.7 }}>
                  Erstelle deine erste Reise und<br/>halte deine Erlebnisse fest.
                </div>
                <Btn onClick={onAdd}>Erste Reise erstellen</Btn>
              </div>
            ) : (
              [...trips]
                .sort((a,b) => b.createdAt - a.createdAt)
                .map(t => (
                  <TripCard
                    key={t.id} trip={t}
                    count={entries.filter(e => e.tripId===t.id).length}
                    coverUrl={covers[t.id]}
                    onClick={() => onSelect(t.id)}
                  />
                ))
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    //  ROOT APP
    // ─────────────────────────────────────────────────────
    function App() {
      const [trips,   setTrips]   = useLocalStorage(STORAGE_TRIPS,   []);
      const [entries, setEntries] = useLocalStorage(STORAGE_ENTRIES, []);
      const [routes,  setRoutes]  = useLocalStorage(STORAGE_ROUTES,  {});
      const [selTrip, setSelTrip] = useState(null);
      const [showForm,setShowForm]= useState(false);
      const importRef = useRef(null);

      const saveTrip = t => setTrips(prev => {
        const i = prev.findIndex(x => x.id===t.id);
        return i>=0 ? prev.map(x => x.id===t.id?t:x) : [...prev, t];
      });

      const deleteTrip = async id => {
        for (const e of entries.filter(x => x.tripId===id))
          for (const p of (e.photos||[])) await dbDeletePhoto(p.id);
        setEntries(prev => prev.filter(e => e.tripId!==id));
        setTrips(prev => prev.filter(t => t.id!==id));
        setRoutes(prev => { const r = {...prev}; delete r[id]; return r; });
        setSelTrip(null);
      };

      const saveRoute = (tripId, geoJson) => {
        setRoutes(prev => geoJson
          ? { ...prev, [tripId]: geoJson }
          : Object.fromEntries(Object.entries(prev).filter(([k]) => k !== tripId))
        );
      };

      const saveEntry = e => setEntries(prev => {
        const i = prev.findIndex(x => x.id===e.id);
        return i>=0 ? prev.map(x => x.id===e.id?e:x) : [...prev, e];
      });

      const deleteEntry = id => setEntries(prev => prev.filter(e => e.id!==id));

      // Export (Daten + Fotos → eine JSON-Datei → iCloud Drive)
      const exportData = async () => {
        const photos = await dbGetAllPhotos();
        const datum  = new Date().toISOString().split("T")[0];
        const blob   = new Blob([JSON.stringify({ trips, entries, photos,
          exportedAt: new Date().toISOString() })], { type:"application/json" });
        const url = URL.createObjectURL(blob);
        const a   = document.createElement("a");
        a.href = url; a.download = `reisetagebuch_backup_${datum}.json`;
        a.click(); URL.revokeObjectURL(url);
      };

      // Import
      const importData = async e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const d = JSON.parse(ev.target.result);
            if (!d.trips || !d.entries) { alert("Ungültige Datei."); return; }
            if (!window.confirm(
              `${d.trips.length} Reise(n) und ${d.entries.length} Einträge importieren?\nAktuelle Daten werden ersetzt.`
            )) return;
            await dbClearPhotos();
            for (const p of (d.photos||[])) await dbSavePhoto(p.id, p.dataUrl);
            setTrips(d.trips);
            setEntries(d.entries);
          } catch { alert("Datei konnte nicht gelesen werden."); }
          e.target.value = "";
        };
        reader.readAsText(file);
      };

      const selTripObj = trips.find(t => t.id===selTrip);

      return (
        <div style={{ maxWidth:620, margin:"0 auto", minHeight:"100vh", background:C.bg }}>
          <input ref={importRef} type="file" accept=".json"
            onChange={importData} style={{ display:"none" }} />

          {selTripObj ? (
            <TripScreen
              trip={selTripObj} entries={entries}
              route={routes[selTrip] || null}
              onBack={() => setSelTrip(null)}
              onSaveEntry={saveEntry}
              onDeleteEntry={deleteEntry}
              onDeleteTrip={deleteTrip}
              onSaveRoute={saveRoute}
              onSaveTrip={saveTrip}
            />
          ) : (
            <Home
              trips={trips} entries={entries}
              onSelect={setSelTrip}
              onAdd={() => setShowForm(true)}
              onExport={exportData}
              onImport={() => importRef.current.click()}
            />
          )}

          {showForm && (
            <TripForm trip={null}
              onSave={t => { saveTrip(t); setShowForm(false); }}
              onClose={() => setShowForm(false)} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator)
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
  </script>
</body>
</html>
